<div
  class="relative bg-white cursor-pointer rounded-xl shadow-lg overflow-hidden flex flex-col h-full"
>
  <img
    [src]="product().imageUrl"
    [alt]="product().name"
    class="w-full h-[300px] object-cover rounded-t-xl"
  />

  <ng-content />

  <div class="p-5 flex flex-col flex-1">
    <h3 class="text-lg font-semibold text-gray-900 mb-2 leading-tigth">{{ product().name }}</h3>
    <p class="text-sm text-gray-600 mb-4 flex-1 leading-relaxed">{{ product().description }}</p>

    <!-- add rating component -->

    <div class="text-sm font-medium mb-4">
      {{ inStockDisplay }}
    </div>

    <div class="flex items-center justify-between mt-auto">
      <span class="text-2xl font-bold text-gray-900">{{ product().price | currency }}</span>
      <button
        matButton="filled"
        class="flex items-center gap-2"
        (click)="store.addToCart(product())"
      >
        <mat-icon>add_shopping_cart</mat-icon>
        Add to Cart
      </button>
    </div>
  </div>
</div>
